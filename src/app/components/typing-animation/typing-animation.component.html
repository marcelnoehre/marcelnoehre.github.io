<div class="typing-animation-container">
    <h1 class="typewriter" [ngClass]="colorTheme" style="--chars: 12; --count: 4;">
        <span class="name-{{colorTheme}}">Marcel Nöhre</span>
    </h1>
    <h2 class="typewriter" [ngClass]="colorTheme" style="--chars: {{charackters.amount}}; --speed: 1s; --delay: 3s; --count: infinite;">
        <span class="job-{{colorTheme}}">{{'STARTING_PAGE.TYPING'|translate}}</span>
    </h2>
</div>
