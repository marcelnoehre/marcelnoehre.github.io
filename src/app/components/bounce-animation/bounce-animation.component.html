<div class="bouncing-animation-container">
    <div class="bouncing-text">
        <div class="wordwrapper" #wordwrapper>
            <div class="{{lang}}">
                <span [ngClass]="colorTheme">&#8595;&nbsp;</span>
                <span *ngFor="let char of bounce; let i = index" [ngClass]="colorTheme">
                    <div *ngIf="char == ' '">&nbsp;</div>
                    <div *ngIf="char != ' '">{{char}}</div>
                </span>
                <span [ngClass]="colorTheme">&nbsp;&#8595;</span>
            </div>
        </div>
    </div>
</div>
