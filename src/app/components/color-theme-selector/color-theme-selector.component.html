<head>
    <script src="https://kit.fontawesome.com/0157b635e5.js" crossorigin="anonymous"></script>
</head>
<div class="color-theme-selector" (click)="changeColorTheme()">
    <div class="container">
        <i class="fas fa-sun" *ngIf="colorTheme == 'light'"></i>
        <i class="fas fa-moon" *ngIf="colorTheme == 'dark'"></i>
    </div>
</div>
