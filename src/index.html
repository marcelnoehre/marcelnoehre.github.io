<!doctype html>
<html class="notranslate" translate="no">

<head>
    <meta charset="utf-8">
    <title>Marcel Nöhre</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" content="notranslate" />
    <script src="https://kit.fontawesome.com/0157b635e5.js" crossorigin="anonymous"></script>
    <script src="swiper.min.js"></script>
    <script>
        var swiper = new Swiper('.swiper-container', {
            effect: 'coverflow',
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: 'auto',
            coverflowEffect: {
                rotate: 60,
                stretch: 0,
                depth: 100,
                modifier: 5,
                slideShadows: true,
            },
            pagination: {
                el: '.swiper-pagination',
            },
        });
    </script>
</head>

<body>
    <app-root></app-root>
</body>

</html>
